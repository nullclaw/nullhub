name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  zig:
    uses: nullclaw/nullbuilder/.github/workflows/zig-ci.yml@v1
    permissions:
      contents: read
    with:
      binary_name: nullhub
      artifact_prefix: nullhub
      test_command: zig build test -Dembed-ui=false -Dbuild-ui=false --summary all

  e2e:
    name: E2E (ubuntu-latest)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: nullclaw/nullbuilder/.github/actions/setup-zig@v1
        with:
          version: 0.16.0

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Build embedded UI assets
        run: |
          npm --prefix ui ci --no-audit --no-fund
          npm --prefix ui run build

      - name: Run E2E tests
        run: bash tests/test_e2e.sh

  linux-aarch64:
    name: Cross-compile linux-aarch64 (ubuntu-latest)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: nullclaw/nullbuilder/.github/actions/setup-zig@v1
        with:
          version: 0.16.0

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Build embedded UI assets
        run: |
          npm --prefix ui ci --no-audit --no-fund
          npm --prefix ui run build

      - name: Build ReleaseSmall
        run: zig build -Dtarget=aarch64-linux-musl -Doptimize=ReleaseSmall -Dbuild-ui=false
