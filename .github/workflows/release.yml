name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  release:
    uses: nullclaw/nullbuilder/.github/workflows/zig-release.yml@v1
    permissions:
      contents: write
      packages: write
    secrets: inherit
    with:
      binary_name: nullhub
      artifact_prefix: nullhub
      node_version: "22"
      node_cache_dependency_path: ui/package-lock.json
      targets_json: >-
        [
          {"os":"ubuntu-latest","target":"linux-x86_64","zig_target":"x86_64-linux-musl","zig_cpu":"","ext":""},
          {"os":"ubuntu-latest","target":"linux-aarch64","zig_target":"aarch64-linux-musl","zig_cpu":"","ext":""},
          {"os":"ubuntu-latest","target":"linux-riscv64","zig_target":"riscv64-linux-musl","zig_cpu":"","ext":""},
          {"os":"macos-latest","target":"macos-aarch64","zig_target":"aarch64-macos","zig_cpu":"","ext":""},
          {"os":"macos-latest","target":"macos-x86_64","zig_target":"x86_64-macos","zig_cpu":"","ext":""},
          {"os":"windows-latest","target":"windows-x86_64","zig_target":"x86_64-windows","zig_cpu":"","ext":".exe"},
          {"os":"windows-latest","target":"windows-aarch64","zig_target":"aarch64-windows","zig_cpu":"","ext":".exe"}
        ]
      pre_build_command: |
        if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
          npm --prefix ui version "$BUILD_VERSION" --no-git-tag-version --allow-same-version
        fi
        npm --prefix ui ci --no-audit --no-fund
        npm --prefix ui run build
      build_args: -Dbuild-ui=false
      source_archive: true
      source_archive_name: nullhub-source-${{ github.ref_name }}.tar.gz
      source_archive_excludes: |
        .git
        .zig-cache
        zig-out
        .generated_ui_assets.zig
        ui/node_modules
        ui/.svelte-kit
      source_prepare_command: |
        if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
          npm --prefix ui version "$BUILD_VERSION" --no-git-tag-version --allow-same-version
        fi
        npm --prefix ui ci --no-audit --no-fund
        npm --prefix ui run build
      publish_docker: true
