<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NullHub</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon-32x32.png" sizes="32x32" type="image/png" />
    <link rel="icon" href="/favicon-16x16.png" sizes="16x16" type="image/png" />
    <link rel="shortcut icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
    <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#e00028" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#e00028" />
    <meta name="msapplication-TileColor" content="#e00028" />
    <meta name="msapplication-config" content="/browserconfig.xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet" />
      <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet" />
    </noscript>
    %sveltekit.head%
  </head>
  <body data-sveltekit-prerender="false" class="theme-matrix effects-disabled">
    <script>
      try {
        var theme = localStorage.getItem('nullhub-theme');
        var effects = localStorage.getItem('nullhub-effects');
        if (theme) {
          document.body.classList.replace('theme-matrix', theme);
          document.documentElement.classList.add(theme);
        }
        if (effects === 'true') document.body.classList.remove('effects-disabled');
      } catch (e) {}
    </script>
    %sveltekit.body%
  </body>
</html>
