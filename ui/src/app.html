<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NullHub</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    %sveltekit.head%
  </head>
  <body data-sveltekit-prerender="false" class="theme-matrix effects-disabled">
    <script>
      try {
        var theme = localStorage.getItem('nullhub-theme');
        var effects = localStorage.getItem('nullhub-effects');
        if (theme) {
          document.body.classList.replace('theme-matrix', theme);
          document.documentElement.classList.add(theme);
        }
        if (effects === 'true') document.body.classList.remove('effects-disabled');
      } catch (e) {}
    </script>
    %sveltekit.body%
  </body>
</html>
